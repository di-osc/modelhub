name: Publish crate

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish without uploading"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    name: Publish vasr-hub
    runs-on: ubuntu-latest
    environment: crates-io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Package
        run: cargo package -p vasr-hub

      - name: Publish dry run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: cargo publish -p vasr-hub --dry-run

      - name: Publish
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        run: cargo publish -p vasr-hub --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
